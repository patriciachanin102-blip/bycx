<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>元气测评后台</title>
    <style>
      :root {
        --bg: #061f22;
        --panel: rgba(17, 73, 80, 0.78);
        --line: rgba(137, 255, 241, 0.38);
        --mint: #79fff0;
        --violet: #9a78ff;
        --text: #f3fffc;
        --muted: rgba(235, 255, 251, 0.68);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 50% 100%, rgba(113, 255, 218, 0.52), transparent 28rem),
          linear-gradient(180deg, #031517, #064e55);
      }

      .wrap {
        width: min(1120px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 28px 16px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        text-shadow: 0 0 18px rgba(121, 255, 240, 0.74);
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .btn {
        display: inline-flex;
        height: 42px;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border: 0;
        border-radius: 999px;
        color: white;
        font-weight: 800;
        text-decoration: none;
        background: linear-gradient(90deg, var(--violet), var(--mint));
        box-shadow: 0 0 18px rgba(121, 255, 240, 0.54);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 18px 56px rgba(0, 255, 229, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.24);
        overflow: hidden;
        backdrop-filter: blur(18px);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 13px 12px;
        border-bottom: 1px solid rgba(137, 255, 241, 0.16);
        font-size: 14px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--mint);
        background: rgba(0, 0, 0, 0.16);
        white-space: nowrap;
      }

      td {
        color: rgba(255, 255, 255, 0.84);
      }

      .score {
        color: var(--mint);
        font-size: 20px;
        font-weight: 900;
      }

      .empty {
        padding: 42px 16px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 760px) {
        header {
          display: block;
        }

        .btn {
          width: 100%;
          margin-top: 14px;
        }

        .panel {
          overflow-x: auto;
        }

        table {
          min-width: 860px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header>
        <div>
          <h1>元气测评后台</h1>
          <p id="summary">正在读取提交数据...</p>
        </div>
        <a class="btn" href="/api/export">一键导出 CSV</a>
      </header>
      <section class="panel" id="panel"></section>
    </main>

    <script>
      const panel = document.querySelector("#panel");
      const summary = document.querySelector("#summary");

      function formatTime(value) {
        return new Date(value).toLocaleString("zh-CN", { hour12: false });
      }

      function partsText(item) {
        return (item.report.parts || []).map(([name, value]) => `${name} ${value}`).join(" / ");
      }

      async function load() {
        const response = await fetch("/api/submissions");
        const items = await response.json();
        summary.textContent = `共 ${items.length} 条测评数据，可实时查阅并导出。`;

        if (!items.length) {
          panel.innerHTML = '<div class="empty">暂无提交记录，完成一次前台测评后这里会自动出现数据。</div>';
          return;
        }

        panel.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>提交时间</th>
                <th>性别</th>
                <th>工作类型</th>
                <th>关注话题</th>
                <th>综合指数</th>
                <th>部位元气值</th>
              </tr>
            </thead>
            <tbody>
              ${items
                .map(
                  (item) => `
                    <tr>
                      <td>${formatTime(item.createdAt)}</td>
                      <td>${item.gender || "-"}</td>
                      <td>${item.workType || "-"}</td>
                      <td>${(item.topics || []).join("、") || "-"}</td>
                      <td class="score">${item.report.total}</td>
                      <td>${partsText(item)}</td>
                    </tr>
                  `
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      load();
    </script>
  </body>
</html>
